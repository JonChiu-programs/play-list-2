<!doctype html>
<html lang="en">
  
<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for play-list-project">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
    }
    #demo {
      margin: var(--ddd-spacing-2);
    }
    play-list-2 {
      margin: var(--ddd-spacing-2);
      border: var(--ddd-border-md);
      border-radius: var(--ddd-radius-lg);
      background-color: blue;
    }

    play-list-slide{
      text-align: left;
      font-size: 200px;
    }

    h3{
      text-align: left;
      position: flex;
    }

    hr{
      width: 75px;
      transform: translateX(-228px);
      color: white;
    }

    @media (min-width: 500px) and (max-width: 800px){
          play-list-2 {
          margin: var(--ddd-spacing-2);
          border: var(--ddd-border-md);
          border-radius: var(--ddd-radius-lg);
          background-color: blue;
        }

        play-list-slide{
          text-align: left;
          font-size: 45px;
          overflow: scroll;
        }

        h3{
          text-align: left;
          position: flex;
        }

        hr{
          width: 75px;
          transform: translateX(5px);
          color: white;
        }
      }
  </style>
  <title>play-list-2</title>
</head>

<body>
  <div id="demo">
    <h1>play-list-2</h1>

    <h2>Default</h2>
    <play-list-2>


      <!-- HTML tags can be called from a .js file without needing to put import script in index.html-->
      <play-list-slide>
        <h3>Hello</h3>
        <hr>
        <p>slide 1</p>
      </play-list-slide>
      <play-list-slide>
        <h3>Hello</h3>
        <hr>
        <p>slide 2</p>
      </play-list-slide>
      <play-list-slide> 
        <h3>Hello</h3>
        <hr>
        <p>slide 3</p>
      </play-list-slide>
      <play-list-slide> 
        <h3>Hello</h3>
        <hr>
        <p>slide 4</p>
      </play-list-slide>
    </play-list-2>

  </div>
  <script type="module" src="./play-list-2.js"></script>
</body>
</html>
